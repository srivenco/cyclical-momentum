services:
  # Web service — FastAPI backend
  - type: web
    name: cyclical-momentum-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_PASSWORD_HASH
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: ALLOWED_ORIGIN
        sync: false          # Your GitHub Pages URL

  # Cron job — daily signal generation at 6:30am IST (1:00am UTC)
  - type: cron
    name: cyclical-momentum-scheduler
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "30 1 * * 1-5"   # 6:30am IST = 1:30am UTC, Mon–Fri
    startCommand: python scheduler.py
    plan: free
    envVars:
      - key: APP_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
